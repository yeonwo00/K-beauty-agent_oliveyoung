services:
  - type: web
    name: k-beauty-recommendation-agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn k_beauty_agent.web:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4-mini
      - key: PUBLIC_LLM_ENABLED
        value: "false"
      - key: FOLLOW_UP_LLM_ENABLED
        value: "false"
      - key: PRODUCT_REASON_LLM_ENABLED
        value: "false"
      - key: ADMIN_TOKEN
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: CORS_ALLOW_ORIGINS
        value: https://yeonwo00.github.io,https://201younghanlee.github.io
      - key: COOKIE_SAMESITE
        value: none
      - key: SECURE_COOKIES
        value: "true"
      - key: DATABASE_URL
        value: sqlite:////tmp/k_beauty_agent.sqlite3
      - key: PRODUCT_SOURCE
        value: curated
      - key: EXTERNAL_CACHE_URL
        value: sqlite:////tmp/external_product_cache.sqlite3
      - key: KRW_PER_USD
        value: "1350"
      - key: OLIVEYOUNG_SNAPSHOT_CSV
        value: data/oliveyoung_snapshot.csv
      - key: OLIVEYOUNG_SNAPSHOT_HTML_DIR
        value: data/oliveyoung_snapshots
      - key: OPEN_BEAUTY_FACTS_API_URL
        value: https://world.openbeautyfacts.org/cgi/search.pl
      - key: COSING_API_URL
        value: https://ec.europa.eu/growth/tools-databases/cosing/api/ingredients
